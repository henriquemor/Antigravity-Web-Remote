<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💬 Antigravity Web Remote</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .terminal-log {
            background: #000;
            color: #ddd;
            padding: 10px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 11px;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.4;
        }
        .terminal-input-bar {
            display: flex;
            background: #1a1a1a;
            border-top: 1px solid #333;
            padding: 4px;
            gap: 4px;
        }
        .terminal-input-bar input {
            flex: 1;
            background: #252525;
            border: 1px solid #333;
            color: #fff;
            padding: 4px 10px;
            font-family: inherit;
            font-size: 12px;
            border-radius: 4px;
        }
        .terminal-btn {
            background: #333;
            color: #ccc;
            border: 1px solid #444;
            padding: 2px 8px;
            font-size: 10px;
            cursor: pointer;
            border-radius: 3px;
        }
        .terminal-btn:hover { background: #444; }
        .terminal-btn.stop { color: #f87171; border-color: #450a0a; }

        body {
            font-family: 'Segoe UI', sans-serif !important;
            background: #1a1a1a !important;
            color: #fff !important;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            margin: 0 !important;
            padding-bottom: 120px; /* Space for fixed input */
        }

        .app-header {
            display: flex;
            align-items: center;
            background: #191919; 
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 2000;
            padding: 5px 16px;
            gap: 12px;
        }
        
        /* Modern Select Components */
        .modern-select-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: #121212;
            border: none;
            border-radius: 4px;
            height: 32px;
            padding: 0 3px;
            flex: 1;
            min-width: 0;
        }
        
        .modern-select-wrapper.compact {
            flex: initial;
            background: #121212;
        }

        .restart-btn {
            background: transparent;
            border: 1px solid #4a5568;
            color: #a0aec0;
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .restart-btn:hover {
            background: #2d3748;
            color: #fff;
        }

        .modern-select {
            appearance: none;
            -webkit-appearance: none;
            display: inline-block;
            padding: 4px 24px 3px 5px; /* space for arrow */
            margin: 0;
            font: inherit;
            outline: none !important;
            box-shadow: none !important;
            line-height: 1.2;
            background: #121212;
            color: white;
            border: 0;
            width: 100%;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
            cursor: pointer;
        }
        
        .modern-select.primary {
            font-size: 14px;
            font-weight: 500;
        }

        .modern-select option {
            background: #121212;
            color: white;
            border: none;
            outline: none;
            box-shadow: none;
        }
        .modern-select select {
            border: none;
            outline: none;
            box-shadow: none;
        }

        /* SVG Arrow Down to replace native appearance */
        .modern-select-arrow {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
        }
        .modern-select-arrow svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }
        
        .project-context {
            display: flex;
            align-items: center;
            flex: 1;
            max-width: 200px; /* Prevents right side from taking over on mobile */
        }

        .restart-btn {
            background: transparent;
            border: 1px solid #4a5568;
            color: #a0aec0;
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .restart-btn:hover {
            background: #2d3748;
            color: #fff;
        }
        
        .cascade-tab {
            padding: 12px 16px;
            cursor: pointer;
            border-right: 1px solid #3a3a3a;
            opacity: 0.6;
            transition: all 0.2s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .cascade-tab.active {
            opacity: 1;
            background: #333;
            border-bottom: 2px solid #3b82f6;
        }

        /* Removed status dots and icons as requested */
        .cascade-tab .status {
            display: none;
        }

        .cascade-tab.active-window .status {
            background: #4ade80;
        }

        /* Green if optimized/active window */

        .chat-container {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-content {
            padding: 0;
        }

        /* Mirror Cleanup Fixes */
        .chat-content [class*="monaco-scrollable-element"] {
            padding-bottom: 0 !important;
            margin-bottom: 0 !important;
        }
        
        .chat-content .scrollbar, 
        .chat-content .invisible-scrollbar {
            display: none !important;
        }

        .chat-content [class*="input-container"],
        .chat-content [class*="footer"],
        .chat-content [class*="header"]:not(.chat-title) {
            display: none !important;
        }

        /* Prevent extra space from virtualization spacers if they leaked */
        .chat-content div[style*="height"] {
            max-height: 100vh;
        }

        .input-section {
            background: #2a2a2a !important;
            padding: 12px;
            /* Account for mobile safe areas */
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            border-top: 1px solid #3a3a3a !important;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2000;
            display: flex;
            gap: 8px;
        }

        textarea {
            flex: 1;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            color: white;
            padding: 10px !important;
            border-radius: 6px;
            resize: none;
            height: 100px;
            font-size: 13px;
            transition: background-color 0.2s;
            outline: none !important;
            box-shadow: none !important;
            -webkit-appearance: none;
            appearance: none;
        }

        textarea:focus {
            border: 1px solid #222 !important;
            background: #111;
            outline: none !important;
            box-shadow: none !important;
        }

        .prose {
            color: #c3d9c4 !important;
        }

        button {
            padding: 0 20px;
            background: #1b4b27; /* Very muted deep green */
            border: none;
            color: #c9d1d9;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none !important;
            box-shadow: none !important;
        }

        button:hover {
            background: #236531;
            color: #ffffff;
        }

        button:focus, button:active {
            outline: none !important;
            box-shadow: none !important;
        }

        .loading {
            text-align: center;
            color: #666;
            margin-top: 50px;
        }

        /* Make buttons in chat content clickable */
        .chat-content button {
            cursor: pointer;
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #ef4444;
            color: white;
            padding: 12px 40px 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            animation: fadeIn 0.2s;
            max-width: 90%;
        }

        .toast .close {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(10px);
            }
        }

        /* Diff Highlighting */
        .diff-line {
            font-family: 'Cascadia Code', 'Source Code Pro', monospace;
            white-space: pre-wrap;
            font-size: 13px;
            line-height: 1.5;
            padding: 0 4px;
        }

        .diff-added {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }

        .diff-removed {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }

        .diff-header {
            color: #60a5fa;
            font-weight: bold;
            background: rgba(96, 165, 250, 0.05);
            display: block;
            margin-top: 8px;
            padding: 4px;
            border-radius: 4px;
        }

        .diff-meta {
            color: #9ca3af;
            font-style: italic;
        }

        .file-list-item {
            padding: 8px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-list-item:hover {
            background: #333;
        }

        .file-status {
            font-weight: bold;
            min-width: 25px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            padding: 2px 4px;
            background: rgba(255,255,255,0.05);
        }

        .status-staged {
            background: #059669 !important;
            color: white !important;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            text-transform: uppercase;
            font-weight: 800;
        }

        .status-M { color: #fbbf24; }
        .status-A { color: #4ade80; }
        .status-D { color: #f87171; }
        .status-untracked { color: #9ca3af; }

        .file-actions {
            margin-left: auto;
            display: flex;
            gap: 6px;
        }

        .action-btn {
            background: transparent;
            border: 1px solid #444;
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 4px;
            cursor: pointer;
            color: #ccc;
        }

        .action-btn:hover {
            background: #444;
            color: white;
        }

        .action-btn.stage { color: #4ade80; border-color: rgba(74, 222, 128, 0.3); }
        .action-btn.unstage { color: #f87171; border-color: rgba(248, 113, 113, 0.3); }

        #commitSection {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #commitMsg {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 10px;
            border-radius: 6px;
            min-height: 60px;
            font-size: 13px;
        }

        #rawEditor {
            width: 100%;
            height: 400px;
            background: #0a0a0a;
            color: #c3d9c4;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Cascadia Code', monospace;
            font-size: 13px;
            line-height: 1.6;
            margin-top: 10px;
            resize: vertical;
        }

        #gitContent {
            background: #111;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            overflow-x: auto;
        }

        .diff-no-wrap .diff-line {
            white-space: pre !important;
        }



        /* Explorer */
        #explorerView {
            display: none;
            padding: 0;
            height: 100%;
            overflow-y: auto;
        }

        .explorer-path-bar {
            display: flex;
            gap: 8px;
            padding: 12px;
            border-bottom: 1px solid #333;
            background: #1e1e1e;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .explorer-path-bar input {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #3a3a3a;
            color: white;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
        }

        .explorer-tree {
            padding: 4px 0;
        }

        .tree-item {
            display: flex;
            align-items: center;
            padding: 3px 8px;
            cursor: pointer;
            user-select: none;
            font-size: 13px;
            color: #ccc;
            transition: background 0.1s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tree-item:hover {
            background: #2a2d2e;
        }

        .tree-item.selected {
            background: #094771;
            color: #fff;
        }

        .tree-chevron {
            width: 16px;
            height: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #888;
            transition: transform 0.15s ease;
            flex-shrink: 0;
        }

        .tree-chevron.open {
            transform: rotate(90deg);
        }

        .tree-chevron.spacer {
            visibility: hidden;
        }

        .terminal-root-select {
            background: #252525;
            color: #ddd;
            border: 1px solid #444;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            max-width: 300px;
            outline: none;
        }
        .terminal-root-select:focus { border-color: #3b82f6; }

        .tree-icon {
            width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 4px;
            font-size: 14px;
            flex-shrink: 0;
        }

        .tree-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tree-children {
            display: none;
        }

        .tree-children.open {
            display: block;
        }

        /* Explorer Editor */
        .explorer-editor-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: #1e1e1e;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .explorer-editor-bar h3 {
            color: #ccc;
            font-size: 13px;
            margin: 0;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .file-badge {
            background: #3b82f6;
            color: white;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Update Git History buttons */
        #gitHistoryView button {
            padding: 6px 14px;
            font-size: 13px;
        }

        /* Update Commit Row padding */
        .commit-row {
            padding: 12px 10px;
        }

        .explorer-editor-btns {
            display: flex;
            gap: 8px;
        }

        .explorer-editor-btns button {
            padding: 5px 14px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            font-weight: 600;
        }

        .btn-cancel {
            background: #3a3a3a;
            color: #ccc;
        }

        .btn-cancel:hover {
            background: #505050;
        }

        .btn-save {
            background: #059669;
            color: white;
        }

        .btn-save:hover {
            background: #047857;
        }

        #explorerEditor {
            width: 100%;
            min-height: calc(100vh - 120px);
            background: #0d1117;
            color: #c9d1d9;
            border: none;
            padding: 16px;
            font-family: 'Cascadia Code', 'Fira Code', 'Source Code Pro', monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: none;
            outline: none;
            tab-size: 4;
        }

        .explorer-empty {
            color: #666;
            text-align: center;
            padding: 40px 20px;
            font-size: 14px;
        }

        #diffView {
            display: none;
            flex-direction: column;
            padding: 16px;
        }

        #gitHistoryView {
            display: none;
            flex-direction: column;
            padding: 0;
        }

        #explorerView {
            display: none;
            flex-direction: column;
            padding: 0;
        }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style id="cascade-style">
        /* Dynamic styles will be injected here */
    </style>
</head>

<body>

    <div class="app-header">
        <!-- Target Chat Selector -->
        <div class="modern-select-wrapper" style="flex: 1.5; max-width: 250px;">
            <select id="cascadeSelector" class="modern-select primary" onchange="selectCascade(this.value)">
                <option value="">Loading Chats...</option>
            </select>
            <div class="modern-select-arrow">
                <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"></path></svg>
            </div>
        </div>
        
        <!-- View Mode Selector -->
        <div id="tabsContainer" class="modern-select-wrapper compact">
            <select id="viewSelector" class="modern-select" onchange="switchView(this.value)">
                <option value="CHAT_VIEW">Chat</option>
            </select>
            <div class="modern-select-arrow" style="right: 4px;">
                <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"></path></svg>
            </div>
        </div>
        
        <!-- Project Root Context -->
        <div class="modern-select-wrapper project-context" id="projectContext" onclick="document.getElementById('projectContextSelector').focus()">
            <select id="projectContextSelector" class="modern-select" onchange="manualContextChange(this.value)">
                <option value="">None</option>
            </select>
            <div class="modern-select-arrow">
                <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"></path></svg>
            </div>
        </div>

        <button class="restart-btn" onclick="restartServer()" title="Restart Backend Server">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            Restart
        </button>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="chat-content" id="chatContent">
            <div class="loading">Waiting for connection...</div>
        </div>
        <div id="diffView">
            <div style="margin-bottom: 12px; display:flex; gap: 8px;">
                <button onclick="loadGitStatus()" style="flex:1; padding: 8px;">Refresh</button>
                <button id="toolbarWrapBtn" onclick="toggleDiffWrap()" style="flex:1; padding: 8px; background:#2f2f2f;">Wrap: on</button>
            </div>
            <div id="gitFileList"></div>
            <div id="editorView" style="display:none">
                <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <h3 id="editingFileName" style="color:#aaa; font-size: 13px; margin:0"></h3>
                    <div style="display:flex; gap:8px">
                        <button onclick="closeEditor()" style="background:#444; padding: 4px 12px; font-size: 12px;">Cancel</button>
                        <button onclick="saveFile()" style="background:#059669; padding: 4px 12px; font-size: 12px;">Save Changes</button>
                    </div>
                </div>
                <textarea id="rawEditor"></textarea>
            </div>
            <div id="gitContent"></div>
            <div id="commitSection" style="display:none">
                <textarea id="commitMsg" placeholder="Commit message..."></textarea>
                <button onclick="commitChanges()" style="background:#3d702d; padding: 8px;">Commit Staged Changes</button>
            </div>

        </div>
        <div id="explorerView">
            <div id="explorerTreeContainer" style="padding-top: 10px;">
                <div class="explorer-tree" id="explorerTree">
                    <div class="explorer-empty">Loading project...</div>
                </div>
            </div>
            <div id="explorerEditorView" style="display:none">
                <div class="explorer-editor-bar">
                    <h3><span class="file-badge">Editing</span> <span id="explorerFileName"></span></h3>
                    <div class="explorer-editor-btns">
                        <button class="btn-cancel" onclick="closeExplorerEditor()">Cancel</button>
                        <button class="btn-save" onclick="saveExplorerFile()">Save</button>
                        <button class="nav-item" onclick="selectExplorerTab()">Explorer</button>
                        <button class="nav-item" onclick="selectTerminalTab()">Terminal</button>
                    </div>
                </div>
                <textarea id="explorerEditor"></textarea>
            </div>
        </div>

        <div id="terminalView" style="display:none; flex-direction:column; background: #000;">
            <div style="padding: 6px 10px; background: #1a1a1a; color: #888; font-size: 11px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 40px; z-index: 10;">
                <div style="display:flex; align-items:center; gap:8px;">
                    <span style="color:#555; text-transform:uppercase; font-size:9px; letter-spacing:0.5px; font-weight:bold;">Dual Terminal Mode</span>
                </div>
                <span style="display:flex; gap:8px;">
                    <button onclick="loadExplorerTree()" style="background:transparent; border:1px solid #444; color:#ccc; border-radius:4px; font-size:10px; padding:2px 6px; cursor:pointer;">Refresh Root</button>
                    <button onclick="clearAllTerminals()" class="terminal-btn clear" style="padding:2px 6px; font-size:10px;">Clear All</button>
                </span>
            </div>
            <div style="display: flex; flex-direction: column;">
                <!-- Term 1 -->
                <div style="display: flex; flex-direction: column; border-bottom: 1px solid #333; position: relative;">
                    <div style="position: absolute; top: 5px; right: 15px; color: #444; font-size: 9px; pointer-events: none; z-index: 10;">TERM 1</div>
                    <div id="terminalLog1" class="terminal-log"></div>
                    <div class="terminal-input-bar">
                        <input type="text" id="terminalInput1" placeholder="Type a command..." onkeydown="handleTerminalKey(event, '1')">
                        <button class="terminal-btn" onclick="sendTerminalCommand('1')">Send</button>
                        <button class="terminal-btn" onclick="sendCtrlC('1')" style="color:#fbbf24; border-color:#78350f;">Ctrl+C</button>
                        <button class="terminal-btn stop" onclick="stopTerminal('1')">Stop</button>
                        <button class="terminal-btn" onclick="clearTerminal('1')">CLS</button>
                    </div>
                </div>
                <!-- Term 2 -->
                <div style="display: flex; flex-direction: column; position: relative;">
                    <div style="position: absolute; top: 5px; right: 15px; color: #444; font-size: 9px; pointer-events: none; z-index: 10;">TERM 2</div>
                    <div id="terminalLog2" class="terminal-log"></div>
                    <div class="terminal-input-bar">
                        <input type="text" id="terminalInput2" placeholder="Type a command..." onkeydown="handleTerminalKey(event, '2')">
                        <button class="terminal-btn" onclick="sendTerminalCommand('2')">Send</button>
                        <button class="terminal-btn" onclick="sendCtrlC('2')" style="color:#fbbf24; border-color:#78350f;">Ctrl+C</button>
                        <button class="terminal-btn stop" onclick="stopTerminal('2')">Stop</button>
                        <button class="terminal-btn" onclick="clearTerminal('2')">CLS</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="gitHistoryView">
             <div class="explorer-path-bar" style="justify-content: space-between;">
                <div style="display:flex; gap:8px; align-items:center;">
                    <span style="font-weight:bold; color:#ccc;">SOURCE CONTROL GRAPH</span>
                    <span id="currentBranchBadge" class="file-badge" style="background:#555">...</span>
                </div>
                <div style="display:flex; gap:8px">
                    <button onclick="loadGitHistory()">Refresh</button>
                    <button onclick="syncChanges()" style="background:#059669">Sync</button>
                    <button onclick="pushChanges()" style="background:#2563eb">Push</button>
                </div>
            </div>
            <div id="gitGraphContainer" style="padding: 10px;">
                <div class="loading">Loading git history...</div>
            </div>
        </div>
    </div>

    <div class="input-section">
        <textarea id="messageInput" placeholder="Type a message..."></textarea>
        <button id="sendBtn">Send</button>
    </div>

    <script>
        const tabsContainer = document.getElementById('tabsContainer');
        const chatContent = document.getElementById('chatContent');
        const chatContainer = document.getElementById('chatContainer');

        let cascades = [];
        let availableRoots = [];
        let currentCascadeId = null;
        let lastActiveCascadeId = null;
        let ws = null;
        let selectedManualContext = null; 
        let terminalLogs = { '1': '', '2': '' };

        function showToast(msg, duration = 4000) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = msg + '<button class="close" onclick="this.parentElement.remove()">×</button>';
            document.body.appendChild(toast);

            setTimeout(() => toast.remove(), duration);
        }

        const getActiveId = () => lastActiveCascadeId || currentCascadeId;

        function connect() {
            ws = new WebSocket(`ws://${location.host}`);

            ws.onclose = () => {
                showToast("Connection lost. Reconnecting...");
                setTimeout(connect, 2000);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.type === 'cascade_list') {
                    cascades = data.cascades;
                    renderTabs();

                    // Auto-select first if none selected
                    if (!currentCascadeId && cascades.length > 0) {
                        selectCascade(cascades[0].id);
                    }
                }

                if (data.type === 'snapshot_update') {
                    if (data.cascadeId === currentCascadeId) {
                        updateContentOnly(currentCascadeId);
                    }
                }
                if (data.type === 'terminal:output') {
                    const logId = `terminalLog${data.id || '1'}`;
                    const container = document.getElementById(logId);
                    if (container) {
                        const pre = document.createElement('span');
                        pre.textContent = data.data;
                        container.appendChild(pre);
                        container.scrollTop = container.scrollHeight;
                    }
                }
                if (data.type === 'terminal:clear') {
                    const logId = `terminalLog${data.id || '1'}`;
                    const container = document.getElementById(logId);
                    if (container) container.innerHTML = '';
                }
            };
        }

        async function restartServer() {
            if (!confirm("Are you sure you want to restart the background server? The app will disconnect momentarily.")) return;
            
            try {
                showToast("Restart signal sent...");
                await fetch('/api/restart', { method: 'POST' });
                // The WS onclose handler will show a message, and we'll reload after a delay
                setTimeout(() => {
                    location.reload();
                }, 3000);
            } catch(e) {
                showToast("Failed to send restart signal: " + e.message, 4000);
            }
        }

        function renderTabs() {
            const selector = document.getElementById('cascadeSelector');
            if (cascades.length === 0) {
                selector.innerHTML = '<option value="">No chats found</option>';
            } else {
                selector.innerHTML = cascades.map(c => `
                    <option value="${c.id}" ${c.id === currentCascadeId ? 'selected' : ''}>
                        ${c.title || 'Untitled'} ${c.active ? ' (Active)' : ''}
                    </option>
                `).join('');
                
                if (cascades.find(c => c.id === currentCascadeId)) {
                    selector.value = currentCascadeId;
                } else if (lastActiveCascadeId && cascades.find(c => c.id === lastActiveCascadeId)) {
                    selector.value = lastActiveCascadeId;
                }
            }

            tabsContainer.innerHTML = `
                <select id="viewSelector" class="modern-select" onchange="switchView(this.value)">
                    <option value="CHAT_VIEW" ${!['EXPLORER_VIEW', 'DIFF_VIEW', 'GIT_HISTORY_VIEW', 'TERMINAL_VIEW'].includes(currentCascadeId) ? 'selected' : ''}>Chat</option>
                    <option value="EXPLORER_VIEW" ${currentCascadeId === 'EXPLORER_VIEW' ? 'selected' : ''}>Explorer</option>
                    <option value="DIFF_VIEW" ${currentCascadeId === 'DIFF_VIEW' ? 'selected' : ''}>Changes</option>
                    <option value="GIT_HISTORY_VIEW" ${currentCascadeId === 'GIT_HISTORY_VIEW' ? 'selected' : ''}>Git History</option>
                    <option value="TERMINAL_VIEW" ${currentCascadeId === 'TERMINAL_VIEW' ? 'selected' : ''}>Terminal</option>
                    <option value="REMOTE_VIEW">📱 Remote Screen</option>
                </select>
                <div class="modern-select-arrow" style="right: 4px;">
                    <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"></path></svg>
                </div>
            `;

            updateProjectContext();
        }

        async function loadInitialRoots() {
            try {
                const res = await fetch('/api/project-roots');
                availableRoots = await res.json();
                updateProjectContext();
            } catch (e) {
                console.error("Failed to load initial roots", e);
            }
        }

        function updateProjectContext() {
            const selector = document.getElementById('projectContextSelector');
            const cascadeRoots = cascades.map(c => c.projectRoot).filter(p => !!p);
            const allPossibleRoots = [...new Set([...availableRoots, ...cascadeRoots])];
            
            // Populate selector
            const options = allPossibleRoots.map(root => {
                const parts = root.split(/[\\/]/).filter(p => p.trim() !== '');
                const name = parts[parts.length - 1] || root;
                return `<option value="${root}" ${root === selectedManualContext ? 'selected' : ''}>${name}</option>`;
            }).join('');
            
            selector.innerHTML = (allPossibleRoots.length === 0 ? '<option value="">None</option>' : '') + options;

            // Default selection
            if (!selectedManualContext && allPossibleRoots.length > 0) {
                selectedManualContext = allPossibleRoots[0];
                selector.value = selectedManualContext;
            }

            if (selectedManualContext) {
                const rootIndex = allPossibleRoots.indexOf(selectedManualContext);
                const colors = ['#007acc', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4'];
                const activeColor = rootIndex !== -1 ? colors[rootIndex % colors.length] : '#007acc';
                
                document.getElementById('projectContext').style.borderColor = activeColor;
            }
        }

        function manualContextChange(newRoot) {
            selectedManualContext = newRoot;
            updateProjectContext();
            
            // If in Terminal, re-subscribe
            if (currentCascadeId === 'TERMINAL_VIEW') {
                initTerminals();
            }
            // If in Explorer, reload
            if (currentCascadeId === 'EXPLORER_VIEW') {
                loadExplorerTree();
            }
        }

        function switchView(view) {
            if (view === 'REMOTE_VIEW') {
                window.location.href = '/remote.html';
                // Revert selected option visually right after popup (in case user comes back)
                const selector = document.getElementById('viewSelector');
                if (selector) {
                    if (['EXPLORER_VIEW', 'DIFF_VIEW', 'GIT_HISTORY_VIEW', 'TERMINAL_VIEW'].includes(currentCascadeId)) {
                        selector.value = currentCascadeId;
                    } else {
                        selector.value = 'CHAT_VIEW';
                    }
                }
                return;
            }

            if (view === 'CHAT_VIEW') {
                if (lastActiveCascadeId && cascades.find(c => c.id === lastActiveCascadeId)) {
                    selectCascade(lastActiveCascadeId);
                } else if (cascades.length > 0) {
                    selectCascade(cascades[0].id);
                }
            } else if (view === 'EXPLORER_VIEW') {
                selectExplorerTab();
            } else if (view === 'DIFF_VIEW') {
                selectDiffTab();
            } else if (view === 'GIT_HISTORY_VIEW') {
                selectGitTab();
            } else if (view === 'TERMINAL_VIEW') {
                selectTerminalTab();
            }
        }

        function selectCascade(id) {
            currentCascadeId = id;
            lastActiveCascadeId = id;
            document.getElementById('chatContent').style.display = 'block';
            document.getElementById('diffView').style.display = 'none';
            document.getElementById('explorerView').style.display = 'none';
            document.getElementById('gitHistoryView').style.display = 'none';
            document.getElementById('terminalView').style.display = 'none';
            document.querySelector('.input-section').style.display = 'flex';
            
            // Sync context automatically
            const cascade = cascades.find(c => c.id === id);
            if (cascade && cascade.projectRoot && cascade.projectRoot !== selectedManualContext) {
                selectedManualContext = cascade.projectRoot;
            }

            renderTabs();
            loadCascade(id);
        }

        function selectExplorerTab() {
            currentCascadeId = 'EXPLORER_VIEW';
            document.getElementById('chatContent').style.display = 'none';
            document.getElementById('diffView').style.display = 'none';
            document.getElementById('explorerView').style.display = 'flex';
            document.getElementById('gitHistoryView').style.display = 'none';
            document.getElementById('terminalView').style.display = 'none';
            document.querySelector('.input-section').style.display = 'none';
            renderTabs();
            loadExplorerTree();
        }

        function selectDiffTab(skipLoad = false) {
            // Toggle wrapping if already active and clicked manually (skipLoad is false)
            if (!skipLoad && currentCascadeId === 'DIFF_VIEW') {
                const content = document.getElementById('gitContent');
                if (content) {
                    content.classList.toggle('diff-no-wrap');
                    const isNoWrap = content.classList.contains('diff-no-wrap');
                    showToast(isNoWrap ? "Wrapping: OFF" : "Wrapping: ON", 1500);
                }
                return;
            }

            currentCascadeId = 'DIFF_VIEW';
            document.getElementById('chatContent').style.display = 'none';
            document.getElementById('diffView').style.display = 'flex';
            document.getElementById('explorerView').style.display = 'none';
            document.getElementById('gitHistoryView').style.display = 'none';
            document.getElementById('terminalView').style.display = 'none';
            document.querySelector('.input-section').style.display = 'none';
            
            // Default to Wrapping ON
            const content = document.getElementById('gitContent');
            if (content) content.classList.remove('diff-no-wrap');

            renderTabs();
            if (!skipLoad) {
                // Only load status if we are not intending to show a specific commit context immediately
                loadGitStatus();
            }
        }

        function selectGitTab() {
            currentCascadeId = 'GIT_HISTORY_VIEW';
            document.getElementById('chatContent').style.display = 'none';
            document.getElementById('diffView').style.display = 'none';
            document.getElementById('explorerView').style.display = 'none';
            document.getElementById('gitHistoryView').style.display = 'flex';
            document.getElementById('terminalView').style.display = 'none';
            document.querySelector('.input-section').style.display = 'none';
            renderTabs();
            loadGitHistory();
        }

        async function getProjectRoot() {
             if (selectedManualContext) return selectedManualContext;
             
             const cascade = cascades.find(c => c.id === lastActiveCascadeId) || cascades[0];
             if (cascade?.projectRoot) return cascade.projectRoot;
             
             const res = await fetch(`/explorer/tree`);
             const data = await res.json();
             return data.projectRoot;
        }

        function selectTerminalTab() {
            currentCascadeId = 'TERMINAL_VIEW';
            document.getElementById('chatContent').style.display = 'none';
            document.getElementById('diffView').style.display = 'none';
            document.getElementById('explorerView').style.display = 'none';
            document.getElementById('gitHistoryView').style.display = 'none';
            document.getElementById('terminalView').style.display = 'flex';
            document.querySelector('.input-section').style.display = 'none';
            renderTabs();
            // Small delay to ensure container is visible for xterm to measure dimensions
            setTimeout(initTerminals, 0);
        }

        async function initTerminals() {
            const root = selectedManualContext;
            if (!root && cascades.length > 0) {
                // Try to find any root
                const anyRoot = cascades.find(c => c.projectRoot)?.projectRoot;
                if (anyRoot) selectedManualContext = anyRoot;
            }

            const activeRoot = selectedManualContext;
            if (activeRoot && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'terminal:subscribe', root: activeRoot, id: '1' }));
                ws.send(JSON.stringify({ type: 'terminal:subscribe', root: activeRoot, id: '2' }));
            }
            
            // Sync selector in Terminal view if it exists (the one in the header is global now)
            // We can actually remove the local terminal selector or keep it in sync.
            // Let's remove the redundancy for a cleaner UI.
        }

        function changeTerminalRoot(newRoot) {
            selectedManualContext = newRoot;
            updateProjectContext();
            clearAllTerminals();
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'terminal:subscribe', root: selectedManualContext, id: '1' }));
                ws.send(JSON.stringify({ type: 'terminal:subscribe', root: selectedManualContext, id: '2' }));
            }
        }

        function handleTerminalKey(e, id) {
            if (e.key === 'Enter') {
                sendTerminalCommand(id);
            }
        }

        async function sendTerminalCommand(id) {
            const input = document.getElementById(`terminalInput${id}`);
            const cmd = input.value;
            if (!cmd) return;

            const root = selectedManualContext;
            if (!root) return;
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'terminal:input',
                    root,
                    id,
                    data: cmd + '\n'
                }));
            }
            input.value = '';
        }

        async function stopTerminal(id) {
            const root = selectedManualContext;
            if (!root) return;
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'terminal:kill',
                    root,
                    id
                }));
            }
        }

        async function sendCtrlC(id) {
            const root = selectedManualContext;
            if (!root) return;
            if (ws && ws.readyState === WebSocket.OPEN) {
                // '\\x03' is the ASCII End of Text character, corresponding to Control+C
                ws.send(JSON.stringify({
                    type: 'terminal:input',
                    root,
                    id,
                    data: '\\x03'
                }));
            }
        }

        function clearTerminal(id) {
            const container = document.getElementById(`terminalLog${id}`);
            if (container) container.innerHTML = '';
        }

        function clearAllTerminals() {
            clearTerminal('1');
            clearTerminal('2');
        }

        function fitTerminal() { /* no-op for now */ }

        async function loadGitHistory() {
             const container = document.getElementById('gitGraphContainer');
             container.innerHTML = '<div class="loading">Loading commits...</div>';
             
             try {
                const root = await getProjectRoot();
                // Load branches first for badge
                const branchRes = await fetch(`/git/branches?path=${encodeURIComponent(root)}&cascadeId=${getActiveId()}`);
                const branchData = await branchRes.json();
                if (branchData.branches) {
                    const active = branchData.branches.find(b => b.active);
                    if (active) document.getElementById('currentBranchBadge').textContent = active.name;
                }

                // Load logs
                const logRes = await fetch(`/git/log?path=${encodeURIComponent(root)}&cascadeId=${getActiveId()}`);
                const logData = await logRes.json();
                
                if (logData.error) {
                    container.innerHTML = `<div style="color:#ef4444">${logData.error}</div>`;
                    return;
                }

                container.innerHTML = logData.commits.map(c => {
                    const msg = c.message.replace(/'/g, "\\'");
                    return `
                    <div class="commit-row" style="border-bottom: 1px solid #333; padding: 12px 10px; margin-bottom: 5px;">
                        <div style="display:flex; cursor:pointer;" onclick="toggleCommitDetails('${c.hash}', '${msg}')">
                            <span style="color:#3b82f6; font-family:monospace; margin-right: 10px; width: 60px;">${c.hash}</span>
                            <span style="flex:1; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${c.message}</span>
                            <span style="color:#888; font-size:12px; margin-left:10px;">${c.author}</span>
                            <span style="color:#666; font-size:12px; margin-left:10px; width:80px; text-align:right;">${c.date}</span>
                        </div>
                        ${c.refs ? `<div style="margin-top:4px;"><span class="file-badge" style="background:#e5a00d; color:black;">${c.refs}</span></div>` : ''}
                        <div id="commit-details-${c.hash}" style="display:none; margin-top:8px; padding-left: 20px; border-left: 2px solid #333;">
                            <div class="loading" style="margin:0; font-size:12px;">Loading files...</div>
                        </div>
                    </div>
                `}).join('');

             } catch (e) {
                 container.innerHTML = `<div style="color:#ef4444">Failed: ${e.message}</div>`;
             }
        }

        async function toggleCommitDetails(hash, message) {
            const el = document.getElementById(`commit-details-${hash}`);
            if (el.style.display === 'block') {
                el.style.display = 'none';
            } else {
                el.style.display = 'block';
                if (!el.dataset.loaded) {
                    const res = await fetch(`/git/commit-files?hash=${hash}&cascadeId=${getActiveId()}`);
                    const data = await res.json();
                    if (data.files) {
                        // Pass message (escaped)
                        const msgEscaped = message.replace(/'/g, "\\'");
                        el.innerHTML = data.files.map(f => `
                            <div style="display:flex; font-size:12px; padding:6px 0; cursor:pointer; color:#ccc; align-items:center;" onclick="showCommitDiff('${hash}', '${f.file}', '${msgEscaped}')">
                                <span style="display:inline-block; width:24px; font-weight:bold; color:${f.status === 'M' ? '#fbbf24' : f.status === 'A' ? '#4ade80' : '#f87171'}">${f.status}</span>
                                <span style="flex:1;">${f.file}</span>
                            </div>
                        `).join('');
                        el.dataset.loaded = 'true';
                    }
                }
            }
        }

        async function showCommitDiff(hash, file, message) {
            // Re-use Git Diff view but for commit
            selectDiffTab(true); // Switch to Changes tab but SKIP loading status
            
            const contentEl = document.getElementById('gitContent');
            const listEl = document.getElementById('gitFileList');
            
            // If we are already viewing this commit's context, don't reload the list
            // We store the current commit hash in a data attribute to check
            if (listEl.dataset.commitHash !== hash) {
                listEl.dataset.commitHash = hash;
                listEl.innerHTML = '<div class="loading">Loading commit files...</div>';

                // Fetch files for this commit to populate the sidebar
                try {
                    const resFiles = await fetch(`/git/commit-files?hash=${hash}&cascadeId=${getActiveId()}`);
                    const dataFiles = await resFiles.json();
                    
                    if (dataFiles.files) {
                        const filesListHtml = dataFiles.files.map(f => `
                            <div class="file-list-item ${f.file === file ? 'selected' : ''}" onclick="showCommitDiff('${hash}', '${f.file}', '${message.replace(/'/g, "\\'")}')">
                                <span style="display:inline-block; width:20px; font-weight:bold; color:${f.status === 'M' ? '#fbbf24' : f.status === 'A' ? '#4ade80' : '#f87171'}">${f.status}</span>
                                <span style="flex:1; overflow:hidden; text-overflow:ellipsis;">${f.file}</span>
                            </div>
                        `).join('');

                        listEl.innerHTML = `
                            <div style="padding:10px; color:#60a5fa; cursor:pointer; border-bottom:1px solid #333; margin-bottom:10px; font-weight:bold;" onclick="delete document.getElementById('gitFileList').dataset.commitHash; loadGitStatus()">
                                ← Back to Working Changes
                            </div>
                            <div style="padding:10px; background:#222; border-radius:6px; border-left:4px solid #3b82f6; margin-bottom:10px;">
                                <div style="font-family:monospace; color:#3b82f6; font-size:12px; margin-bottom:4px;">${hash.substring(0,7)}</div>
                                <div style="font-weight:bold; color:#fff; font-size:12px; line-height:1.4; max-height:40px; overflow:hidden;">${message}</div>
                            </div>
                            <div style="overflow-y:auto; flex:1;">
                                ${filesListHtml}
                            </div>
                        `;
                    }
                } catch(e) {
                    listEl.innerHTML = `<div style="color:#ef4444">Failed to load file list: ${e.message}</div>`;
                }
            } else {
                // Just update selection highlight
                Array.from(listEl.querySelectorAll('.file-list-item')).forEach(el => el.classList.remove('selected'));
                // Simple text match might be enough or add data-file attr
                // For MVP just re-render is safer but let's try to be smart?
                // Actually re-rendering the list is fast enough for <100 files. 
                // But let's stick to the "don't reload if same hash" logic and just update styles if possible.
                // For simplicity of this function, I'll just re-highlight based on text content if I can, 
                // OR just let the user click. 
                // Let's at least update the "selected" class manually
                const items = listEl.querySelectorAll('.file-list-item');
                items.forEach(item => {
                    if (item.textContent.includes(file)) item.classList.add('selected'); // loose match
                });
            }

            contentEl.innerHTML = '<div class="loading">Loading diff...</div>';
            
            try {
                const res = await fetch(`/git/diff-commit?hash=${hash}&file=${encodeURIComponent(file)}&cascadeId=${getActiveId()}`);
                const data = await res.json();
                if (data.diff) {
                    const html = data.diff.split('\n').map(l => {
                        let cls = 'diff-line';
                        if (l.startsWith('+')) cls += ' diff-added';
                        if (l.startsWith('-')) cls += ' diff-removed';
                        if (l.startsWith('diff')) cls += ' diff-header';
                        return `<div class="${cls}">${l.replace(/</g, '&lt;')}</div>`;
                    }).join('');
                    
                    contentEl.innerHTML = `
                        <div style="background:#e5a00d; color:black; padding:8px 16px; font-weight:bold; margin-bottom:16px; border-radius:6px; display:flex; align-items:center; gap:8px;">
                            <span style="font-size:18px">⚠️</span>
                            <span>READ ONLY: Viewing historical commit ${hash.substring(0,7)}</span>
                        </div>
                        <div style="margin-bottom:10px; font-family:monospace; color:#ccc;">${file}</div>
                    ` + html;
                } else {
                    contentEl.innerHTML = '<div style="color:#9ca3af; padding: 20px; text-align:center;">No direct text differences found (might be binary, empty, or line-endings only).</div>';
                }
            } catch(e) {
                contentEl.innerHTML = `<div style="color:#ef4444">${e.message}</div>`;
            }
        }

        async function pushChanges() {
            showToast('Pushing...');
            try {
                const res = await fetch('/git/push', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cascadeId: getActiveId() })
                });
                const data = await res.json();
                if (data.ok) showToast('<span style="color:#4ade80">✓ Push Successful</span>');
                else showToast('Push failed: ' + data.error);
                loadGitHistory();
            } catch(e) { showToast('Push error: ' + e.message); }
        }

        async function syncChanges() {
             showToast('Syncing (Pull --rebase + Push)...');
            try {
                const res = await fetch('/git/sync', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cascadeId: getActiveId() })
                });
                const data = await res.json();
                if (data.ok) showToast('<span style="color:#4ade80">✓ Sync Successful</span>');
                else showToast('Sync failed: ' + data.error);
                loadGitHistory();
            } catch(e) { showToast('Sync error: ' + e.message); }
        }

        async function loadGitStatus() {
            const listEl = document.getElementById('gitFileList');
            const contentEl = document.getElementById('gitContent');
            const path = ''; // Default to root
            
            listEl.innerHTML = '<div class="loading">Checking git...</div>';
            contentEl.innerHTML = '';
            contentEl.dataset.currentFile = ''; // Reset current file on status reload
            contentEl.dataset.currentStaged = ''; // Reset current staged status

            try {
                const root = await getProjectRoot();
                const res = await fetch(`/git/status?path=${encodeURIComponent(root)}&cascadeId=${getActiveId()}`);
                const data = await res.json();
                
                if (data.error) {
                    listEl.innerHTML = `<div style="color:#ef4444">${data.error}</div>`;
                    return;
                }

                if (!data.status || data.status === 'No changes') {
                    listEl.innerHTML = '<div style="color:#9ca3af; padding: 20px; text-align:center;">No changes detected.</div>';
                    // Load full diff anyway just in case
                    loadGitDiff('', path, false);
                    return;
                }

                const lines = data.status.split('\n').filter(l => l.length > 3);
                
                let stagedHtml = '';
                let changedHtml = '';
                let hasStaged = false;

                lines.forEach(line => {
                    const statusVal = line.slice(0, 2);
                    const file = line.substring(3).trim();
                    
                    const indexStatus = statusVal[0];   // Staged status
                    const workTreeStatus = statusVal[1]; // Unstaged status

                    // 1. Is it staged? (Index has modification, addition, deletion, etc.)
                    if (indexStatus !== ' ' && indexStatus !== '?') {
                        hasStaged = true;
                        stagedHtml += `
                            <div class="file-list-item" onclick="loadGitDiff('${file}', '${path}', true)">
                                <span class="file-status status-${indexStatus}">${indexStatus}</span>
                                <span style="flex:1">${file}</span>
                                <div class="file-actions">
                                    <button class="action-btn" onclick="openEditor(event, '${file}', '${path}')">Edit</button>
                                    <button class="action-btn unstage" onclick="unstageFile(event, '${file}', '${path}')">Unstage</button>
                                </div>
                            </div>
                        `;
                    }
                    
                    // 2. Is it unstaged/changed? (Working tree has modification, deletion, or untracked)
                    if (workTreeStatus !== ' ' || statusVal === '??') {
                        const displayStatus = statusVal === '??' ? 'U' : workTreeStatus;
                        changedHtml += `
                            <div class="file-list-item" onclick="loadGitDiff('${file}', '${path}', false)">
                                <span class="file-status status-${displayStatus || 'untracked'}">${displayStatus}</span>
                                <span style="flex:1">${file}</span>
                                <div class="file-actions">
                                    <button class="action-btn" onclick="openEditor(event, '${file}', '${path}')">Edit</button>
                                    <button class="action-btn stage" onclick="stageFile(event, '${file}', '${path}')">Stage</button>
                                </div>
                            </div>
                        `;
                    }
                });

                let finalHtml = '';
                if (stagedHtml) {
                    finalHtml += `<div style="font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; margin: 10px 0 4px 8px;">Staged Changes</div>`;
                    finalHtml += stagedHtml;
                }
                if (changedHtml) {
                    finalHtml += `<div style="font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; margin: 10px 0 4px 8px;">Changes</div>`;
                    finalHtml += changedHtml;
                }

                // Show commit section only if there are staged changes
                const commitSection = document.getElementById('commitSection');
                commitSection.style.display = hasStaged ? 'flex' : 'none';

                finalHtml += `
                    <div class="file-list-item" onclick="loadGitDiff('', '${path}', false)" style="font-weight:bold; border-top: 1px solid #333; margin-top: 12px; padding-top: 12px; color: #60a5fa; justify-content: center;">
                        <span>Show All Changes Diff</span>
                    </div>
                `;
                
                listEl.innerHTML = finalHtml;

            } catch (e) {
                listEl.innerHTML = `<div style="color:#ef4444">Failed: ${e.message}</div>`;
            }
        }

        function toggleDiffWrap() {
            const content = document.getElementById('gitContent');
            const btn = document.getElementById('toolbarWrapBtn');
            const isWrapped = !content.classList.contains('diff-no-wrap');
            
            if (isWrapped) {
                content.classList.add('diff-no-wrap');
                btn.innerText = 'Wrap: off';
                btn.style.background = '#1d1d1d';
            } else {
                content.classList.remove('diff-no-wrap');
                btn.innerText = 'Wrap: on';
                btn.style.background = '#2f2f2f';
            }
        }

        async function loadGitDiff(file, path, isStaged = false) {
            const contentEl = document.getElementById('gitContent');
            
            // Check if we are toggling closure
            if (contentEl.dataset.currentFile === file && contentEl.dataset.currentStaged === String(isStaged)) {
                contentEl.innerHTML = '';
                contentEl.dataset.currentFile = '';
                contentEl.dataset.currentStaged = '';
                return;
            }
            
            contentEl.dataset.currentFile = file;
            contentEl.dataset.currentStaged = String(isStaged);
            
            contentEl.innerHTML = '<div class="loading">Loading diff...</div>';
            
            try {
                const root = await getProjectRoot();
                const res = await fetch(`/git/diff?file=${encodeURIComponent(file)}&path=${encodeURIComponent(root)}&cascadeId=${getActiveId()}&staged=${isStaged}`);
                const data = await res.json();

                if (data.error) {
                    contentEl.innerHTML = `<div style="color:#ef4444">${data.error}</div>`;
                    return;
                }

                if (file === '' && data.diff && data.diff.includes('diff --git')) {
                    // Split All Changes by file
                    const files = data.diff.split(/^diff --git /m).filter(f => f.trim());
                    contentEl.innerHTML = files.map(f => {
                         const headerLine = f.split('\n')[0];
                         const fileNameMatch = headerLine.match(/b\/(.*)$/);
                         const fileName = fileNameMatch ? fileNameMatch[1] : 'File';
                         
                         return `
                            <div style="margin-bottom: 40px; border-bottom: 1px solid #333; padding-bottom: 20px;">
                                <h1 style="color:#fff; font-size: 1.25rem; margin-bottom: 15px; background:#222; padding: 10px; border-radius: 6px; border-left: 4px solid #3b82f6;">
                                    ${fileName}
                                </h1>
                                <div style="background:#0a0a0a; border-radius: 8px; padding: 4px; overflow-x: auto;">
                                    ${renderDiffLines(f)}
                                </div>
                            </div>
                         `;
                    }).join('');
                } else {
                    contentEl.innerHTML = `
                        <h1 style="color:#fff; font-size: 1.1rem; margin-bottom: 15px; background:#222; padding: 10px; border-radius: 6px; border-left: 4px solid #fbbf24;">
                            ${file || 'All Changes'}
                        </h1>
                        <div style="background:#0a0a0a; border-radius: 8px; padding: 4px; overflow-x: auto;">
                            ${renderDiffLines(data.diff)}
                        </div>
                    `;
                }
            } catch (e) {
                contentEl.innerHTML = `<div style="color:#ef4444">Failed: ${e.message}</div>`;
            }
        }

        function renderDiffLines(diffText) {
            if (!diffText || diffText === 'No diff available') return '<div class="diff-meta">No changes to show.</div>';
            
            const lines = diffText.split('\n');
            return lines.map(line => {
                let className = 'diff-line';
                if (line.startsWith('+') && !line.startsWith('+++')) className += ' diff-added';
                else if (line.startsWith('-') && !line.startsWith('---')) className += ' diff-removed';
                else if (line.startsWith('@@')) className += ' diff-header';
                else if (line.startsWith('diff') || line.startsWith('index') || line.startsWith('---') || line.startsWith('+++')) className += ' diff-meta';
                
                return `<div class="${className}">${escapeHtml(line) || ' '}</div>`;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }



        async function stageFile(e, file, path) {
            e.stopPropagation();
            try {
                await fetch('/git/stage', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file, path, cascadeId: getActiveId() })
                });
                loadGitStatus();
            } catch (err) { alert(err.message); }
        }

        async function unstageFile(e, file, path) {
            e.stopPropagation();
            try {
                await fetch('/git/unstage', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ file, path, cascadeId: getActiveId() })
                });
                loadGitStatus();
            } catch (err) { alert(err.message); }
        }

        let editingFile = { name: '', path: '' };

        async function openEditor(e, file, path) {
            e.stopPropagation();
            editingFile = { name: file, path: path };
            document.getElementById('gitContent').style.display = 'none';
            document.getElementById('editorView').style.display = 'block';
            document.getElementById('editingFileName').innerText = `Editing: ${file}`;
            
            try {
                const res = await fetch(`/git/read?file=${encodeURIComponent(file)}&path=${encodeURIComponent(path)}&cascadeId=${getActiveId()}`);
                const data = await res.json();
                document.getElementById('rawEditor').value = data.content;
            } catch (err) { alert(err.message); }
        }

        function closeEditor() {
            document.getElementById('gitContent').style.display = 'block';
            document.getElementById('editorView').style.display = 'none';
        }

        async function saveFile() {
            const content = document.getElementById('rawEditor').value;
            try {
                await fetch('/git/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        file: editingFile.name, 
                        path: editingFile.path, 
                        content,
                        cascadeId: getActiveId() 
                    })
                });
                closeEditor();
                loadGitDiff(editingFile.name, editingFile.path);
            } catch (err) { alert(err.message); }
        }

        async function commitChanges() {
            const msg = document.getElementById('commitMsg').value;
            const path = ''; // Default to root
            if (!msg) return alert("Please enter a commit message");
            
            try {
                const res = await fetch('/git/commit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path, message: msg, cascadeId: getActiveId() })
                });
                const data = await res.json();
                if (data.ok) {
                    document.getElementById('commitMsg').value = '';
                    loadGitStatus();
                    document.getElementById('gitContent').innerHTML = '<div style="color:#4ade80">Commit successful!</div>';
                } else {
                    alert(data.error);
                }
            } catch (err) { alert(err.message); }
        }

        async function loadCascade(id) {
            try {
                // 1. Fetch Styles (Once)
                const styleRes = await fetch(`/styles/${id}`);
                if (styleRes.ok) {
                    const styleData = await styleRes.json();
                    document.getElementById('cascade-style').textContent = `
                        ${styleData.css}
                        /* Custom Overrides to clean up mirror */
                        #cascade { 
                            background: transparent !important; 
                            color: white !important; 
                            padding: 0 !important;
                            margin: 0 !important;
                        }
                        #cascade .monaco-list-spacer, 
                        #cascade .monaco-placeholder,
                        #cascade .monaco-scrollable-element > .scrollbar,
                        #cascade .scrollbar { 
                            display: none !important; 
                            height: 0 !important; 
                            width: 0 !important; 
                        }
                        
                        /* Fix for the huge bottom space and virtualization spacers */
                        #cascade [class*="monaco-scrollable-element"],
                        #cascade [class*="monaco-list-rows"],
                        #cascade [class*="rows-container"],
                        #cascade .monaco-list-rows,
                        #cascade .rows-container {
                            height: auto !important;
                            min-height: 0 !important;
                            max-height: none !important;
                            padding: 0 !important;
                            margin: 0 !important;
                            transform: none !important;
                            top: 0 !important;
                            position: relative !important;
                            overflow: visible !important;
                        }
                        
                        /* Ensure individual messages don't have absolute positioning offsets */
                        #cascade [class*="message"], #cascade [class*="monaco-list-row"] {
                            position: relative !important;
                            top: 0 !important;
                            transform: none !important;
                            margin-bottom: 10px !important;
                        }
                        
                        /* Specific fix for the input bottom div - Second div of #conversation */
                        #cascade #conversation > div:nth-child(2),
                        #conversation > div:nth-child(2) {
                            height: 400px !important;
                            opacity: 0.5 !important;
                            margin-top: 3em;
                        }
                            #cascade #conversation > div:nth-child(2),
                        #conversation > div:nth-child(2):active, #cascade #conversation > div:nth-child(2),
                        #conversation > div:nth-child(2):hover {
                            height: 400px !important;
                            opacity: 1 !important;
                        }
                        
                        /* Hide input/footer areas that might leak */
                        #cascade [class*="input"], #cascade [class*="footer"], #cascade [class*="composer"] {
                            display: none !important;
                        }
                        
                        #cascade .prose {
                            --tw-prose-body: #c3d9c4 !important;
                            --tw-prose-headings: #f3f4f6 !important;
                            --tw-prose-lead: #c3d9c4 !important;
                            --tw-prose-links: #60a5fa !important;
                            --tw-prose-bold: #f3f4f6 !important;
                            --tw-prose-counters: #9ca3af !important;
                            --tw-prose-bullets: #d1d5db !important;
                            --tw-prose-hr: #374151 !important;
                            --tw-prose-quotes: #f3f4f6 !important;
                            --tw-prose-quote-borders: #374151 !important;
                            --tw-prose-captions: #9ca3af !important;
                            --tw-prose-code: #f3f4f6 !important;
                            --tw-prose-pre-code: #e5e7eb !important;
                            --tw-prose-pre-bg: #1f2937 !important;
                            --tw-prose-th-borders: #374151 !important;
                            --tw-prose-td-borders: #374151 !important;
                            color: #c3d9c4 !important; /* Force color explicitly too */
                        }
                        #cascade .prose, #cascade .prose *, #cascade [class*="message"] *, #cascade p, #cascade span {
                            color: #c3d9c4 !important;
                        }
                        /* Ensure code blocks are readable */
                        pre, code { background: #111 !important; color: #ddd !important; }
                    `;
                }

                // 2. Fetch Content
                await updateContentOnly(id);
            } catch (e) {
                console.error(e);
            }
        }

        async function updateContentOnly(id) {
            try {
                const res = await fetch(`/snapshot/${id}`);
                if (!res.ok) throw new Error('Failed');
                const data = await res.json();

                // Preserve Scroll
                const isAtBottom = chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer
                    .clientHeight < 50;

                document.body.style.backgroundColor = data.bodyBg || '#1a1a1a';
                chatContent.innerHTML = data.html;
                // No inner style block needed anymore

                if (isAtBottom) chatContainer.scrollTop = chatContainer.scrollHeight;
            } catch (e) {}
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value;
            if (!text || !currentCascadeId) return;

            // Clear immediately to feel responsive
            input.value = '';

            try {
                await fetch(`/send/${currentCascadeId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: text
                    })
                });
                updateContentOnly(currentCascadeId); // Immediate refresh try
            } catch (e) {
                console.error("Send failed", e);
                input.value = text; // Restore on fail
                alert("Failed to send message: " + e.message);
            }
        }

        document.getElementById('sendBtn').onclick = sendMessage;

        document.getElementById('messageInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Relay button/element clicks back to Antigravity
        chatContent.addEventListener('click', async (e) => {
            // Find closest element with a relay ID (can be button, div, span, etc.)
            const target = e.target.closest('[data-relay-id]');
            if (!target || !currentCascadeId) return;

            const relayId = target.getAttribute('data-relay-id');
            if (!relayId) return;

            e.preventDefault();
            e.stopPropagation();

            console.log('Relaying click:', relayId);

            try {
                const res = await fetch(`/click/${currentCascadeId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        relayId
                    })
                });

                if (!res.ok) {
                    const err = await res.json();
                    console.error('Click failed:', err);
                    showToast(err.error || err.reason || 'Click failed');
                }

                // Refresh after click - two passes: quick visual + delayed for new elements (selects)
                setTimeout(() => updateContentOnly(currentCascadeId), 300);
                setTimeout(() => updateContentOnly(currentCascadeId), 1200);
            } catch (err) {
                console.error('Click relay error:', err);
                showToast('Network error: ' + err.message);
            }
        });

        // === Explorer Tab Logic ===

        let explorerEditingFile = { name: '', path: '' };

        async function loadExplorerTree() {
            const treeEl = document.getElementById('explorerTree');
            const treeRoot = await getProjectRoot();
            if (!treeRoot) return;
            treeEl.innerHTML = '<div class="explorer-empty">Loading...</div>';

            try {
                const res = await fetch(`/explorer/tree?path=${encodeURIComponent(treeRoot)}&cascadeId=${getActiveId()}`);
                const data = await res.json();
                
                if (data.error) {
                    treeEl.innerHTML = `<div style="color:#ef4444; padding:16px">${data.error}</div>`;
                    return;
                }

                if (!data.tree || data.tree.length === 0) {
                    treeEl.innerHTML = '<div class="explorer-empty">Empty directory</div>';
